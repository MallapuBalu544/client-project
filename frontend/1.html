<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Web Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>This is a simple HTML page</p>
</header>

<main>
    <h2>About</h2>
    <p>Hello! I am learning HTML. This is my first web page.</p>

    <button onclick="sayHello()">Click Me</button>
</main>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

<script>
    function sayHello() {
        alert("Hello! Thanks for clicking the button 😊");
    }
</script>

</body>
</html>
